# Notion workspace mapping.
# This file is populated by `company-brain init` after connecting to a workspace.
# Do not edit manually unless you know the Notion page/database IDs.

workspace_id: null
root_page_id: null

# Maps section keys (from wiki.yaml) to their Notion page IDs.
section_page_ids: {}

# Member read access is delegated to Notion teamspaces (set access levels in
# Notion). teamspaces: teamspace key -> the parent page ID that pages sync under.
# section_teamspace: wiki section (exact or path prefix) -> teamspace key, or
# "admin_only" to keep that section MD-only (never mirrored to Notion).
#
# Default install: two teamspaces — admin + company.
#   admin   — finance, legal, admin
#   company — engineering, product, growth (whole-company read)
# Optional splits: set parent page ids under engineering / product / growth and
# point section_teamspace (and sync: location:*) at those keys. Empty/missing
# split keys fall back to company.
#
# Employee wiki pages use frontmatter ``sync:`` (not section_teamspace):
#   private -> member_{key} or members.yaml notion_teamspace
#   company -> company
#   admin_only -> admin (admin teamspace mirror)
#   location:{dept} -> that teamspace if configured, else company for
#     engineering|product|growth
#   not_synced -> no Notion mirror
teamspaces:
  admin: ""
  company: ""
  # Optional department splits (leave blank to use company):
  # engineering: ""
  # product: ""
  # growth: ""
section_teamspace:
  admin: admin
  finance: admin
  legal: admin
  crm: company
  engineering: company
  product: company
  growth: company

# CRM entity + inbound database mirrors (populate database_id after Notion connect).
crm_databases:
  crm_contacts:
    database_id: ""
    columns:
      title: Name
      segment: Segment
      email: Email
      main_connection: "Main connection"
      status: Status
  inbound_press_podcast:
    database_id: ""
    columns:
      title: Name
      contact: Contact
      score: Score
      status: Status
      received: Received
  inbound_event_invitation:
    database_id: ""
    columns:
      title: Name
      contact: Contact
      score: Score
      status: Status
      received: Received
  inbound_partnership:
    database_id: ""
    columns:
      title: Name
      contact: Contact
      score: Score
      status: Status
      received: Received
  inbound_founder_networking:
    database_id: ""
    columns:
      title: Name
      contact: Contact
      score: Score
      status: Status
      received: Received
  inbound_investor_interest:
    database_id: ""
    columns:
      title: Name
      contact: Contact
      score: Score
      status: Status
      received: Received
  inbound_candidate:
    database_id: ""
    columns:
      title: Name
      contact: Contact
      score: Score
      status: Status
      received: Received

# Tracking database ID for article metadata.
tracking_database_id: null

# Discovery state from the last `company-brain init` run.
discovery:
  strategy: null          # adopt | alongside | selective | null
  scanned_at: null
  existing_page_count: 0
  adopted_page_ids: []

# Multi-DB task registry for Linear task platform (Phase 5).
# Populate database_id after connecting Notion; column names must match your DB schema.
task_databases:
  engineering:
    database_id: ""
    columns:
      title: Name
      status: Status
      assignee: Owner
      due: Due
      linear: "Linear ID"
  operations:
    database_id: ""
    columns:
      title: Name
      status: Status
      assignee: Owner
      due: Due
      linear: "Linear ID"

# Route bindings to a task database by department/project (longest match wins).
task_routing:
  - match: { department: engineering }
    database: engineering
  - match: { department: operations }
    database: operations

# Finance agent page/database bindings (discover-or-create, populated on first run).
finance_pages: {}

change_request_database:
  database_id: ""
  columns:
    title: Title
    status: Status
    requester: Requester
    change_class: Class
    slack_thread: Slack thread
    pr_url: PR

# Hard wiki↔Notion conflicts awaiting admin (or evidence auto-resolve).
conflict_resolution_database:
  database_id: ""
  columns:
    title: Title
    status: Status
    rel_path: Path
    reason: Reason
    winner: Winner

# Conflict-adjacent review queue (stale pages, etc.).
review_database:
  database_id: ""
  columns:
    title: Title
    status: Status
    rel_path: Path
    kind: Kind

# Archive parent pages per teamspace (populated by notion_onboarding).
archive_parents:
  admin: ""
  company: ""

# False when onboarding ingested existing pages without confirm_mirror.
# Omit or true = structured mirror allowed.
mirror_enabled: null
