# Notion workspace mapping.
# This file is populated by `company-brain init` after connecting to a workspace.
# Do not edit manually unless you know the Notion page/database IDs.

workspace_id: null
root_page_id: null

# Maps section keys (from wiki.yaml) to their Notion page IDs.
section_page_ids: {}

# Member read access is delegated to Notion teamspaces (set access levels in
# Notion). teamspaces: teamspace key -> the parent page ID that pages sync under.
# section_teamspace: wiki section (exact or path prefix) -> teamspace key, or
# "admin_only" to keep that section MD-only (never mirrored to Notion).
teamspaces: {}
section_teamspace: {}

# Tracking database ID for article metadata.
tracking_database_id: null

# Discovery state from the last `company-brain init` run.
discovery:
  strategy: null          # adopt | alongside | selective | null
  scanned_at: null
  existing_page_count: 0
  adopted_page_ids: []

# Multi-DB task registry for Linear task platform (Phase 5).
# Populate database_id after connecting Notion; column names must match your DB schema.
task_databases:
  engineering:
    database_id: ""
    columns:
      title: Name
      status: Status
      assignee: Owner
      due: Due
      linear: "Linear ID"
  operations:
    database_id: ""
    columns:
      title: Name
      status: Status
      assignee: Owner
      due: Due
      linear: "Linear ID"

# Route bindings to a task database by department/project (longest match wins).
task_routing:
  - match: { department: engineering }
    database: engineering
  - match: { department: operations }
    database: operations

# Finance agent page/database bindings (discover-or-create, populated on first run).
finance_pages: {}
