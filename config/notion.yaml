# Notion workspace mapping.
# This file is populated by `company-brain init` after connecting to a workspace.
# Do not edit manually unless you know the Notion page/database IDs.

workspace_id: null
root_page_id: null

# Maps section keys (from wiki.yaml) to their Notion page IDs.
section_page_ids: {}

# Member read access is delegated to Notion teamspaces (set access levels in
# Notion). teamspaces: teamspace key -> the parent page ID that pages sync under.
# section_teamspace: wiki section (exact or path prefix) -> teamspace key, or
# "admin_only" to keep that section MD-only (never mirrored to Notion).
#
# Employee wiki pages use frontmatter ``sync:`` (not section_teamspace):
#   private -> member_{key} or members.yaml notion_teamspace
#   company -> company
#   admin_only -> admin (admin teamspace mirror)
#   not_synced -> no Notion mirror
teamspaces:
  admin: ""
  company: ""
  engineering: ""
  product: ""
section_teamspace:
  admin: admin
  crm: company
  engineering: engineering
  product: product

# CRM entity + inbound database mirrors (populate database_id after Notion connect).
crm_databases:
  crm_contacts:
    database_id: ""
    columns:
      title: Name
      segment: Segment
      email: Email
      main_connection: "Main connection"
      status: Status
  inbound_press_podcast:
