# Engineering department configuration.
#
# Non-secret settings only — API keys and OAuth tokens live in .env.

linear:
  # Default team for issue creation (set team_id UUID or team_key e.g. ENG).
  team_key: ENG
  team_id: ""
  default_priority: 2
  poll_interval_minutes: 30
  stale_audit:
    ready_for:
      day: monday
      time: "09:00"
    estimated_minutes: 15
    buffer_minutes: 720
    stale_days: 14
  manual:
    wait_for_completion: true
    max_checks: 14
    check_time: "12:00"
  slack_channel: "#team-ops"
  slot_check:
    auto_move: false
  task_classes:
    inbox_action:
      fan_out: [linear, gmail]
    team_on_it:
      fan_out: [linear, gmail]
    meeting_action:
      fan_out: [linear, notion]
    slack_action:
      fan_out: [linear, slack]
