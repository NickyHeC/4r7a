# Growth department platform settings (non-secret).
# Secrets: DISCORD_BOT_TOKEN, GOOGLE_ADS_* in the environment only.

discord:
  guild_id: ""
  poll_interval_minutes: 15
  workdays_only: false
  exclude_channels:
    - off-topic
  onboarding_default_backfill_days: 30
  member_scoring_min_messages: 3
  interesting_score_threshold: 4
  absorb_batch_hour_utc: 6

google_ads:
  enabled: true
  timezone: America/Los_Angeles
  run_weekday: 0          # 0=Monday
  run_hour: 8
  run_minute: 0
  pacing_alert_threshold: 0.9
  cpa_lookback_days: 30

slack:
  discord_channel: "#discord"

# Workstreams (not platforms) — persistent managers + specialists.
activity:
  poll_interval_minutes: 30

content:
  poll_interval_minutes: 60
  weekly_pull_weekday: 0   # 0=Monday — published content pull + voice refresh

competitor:
  poll_interval_minutes: 360
  # Core product keywords seed discover + onboarding candidate list.
  keywords: []

leads:
  poll_interval_minutes: 15
