# Operations department configuration.
#
# Non-secret settings only — OAuth tokens and API keys live in .env.

gmail:
  provider: official

  # Service profile for GMAIL_MAILBOX when not overridden in mailbox_profiles.
  # Override per deploy with GMAIL_PROFILE=employee|service_account|...
  profile: executive_assistant

  # EA vs reduced-service profiles (Phase 5).
  # gmail_manager runs for every account; triage labels + specialists follow profile.
  profiles:
    executive_assistant:
      description: >-
        Full executive-assistant package for startup founders (CEO inbox).
        All attention + domain labels, nested cold inbound and newsletters,
        every specialist agent.
      use_full_labels: true
      agents: all

    employee:
      description: >-
        Reduced service for employee Gmail accounts. Basic attention 1–4;
        flat Cold Inbound and Newsletters (no nested sub-labels); no Investor
        or Warm intro labels. CRM/notifications agents allocated accordingly.
      labels:
        attention:
          - "1. Action"
          - "2. Reply"
          - "3. FYI"
          - "4. Team On It"
        domain:
          - Customer
          - "AI Meeting Notes"
          - Receipts
          - Meeting
          - "Meeting Request"
          - Ingest
          - Vendor
          - People
          - Decision
          - Cold Inbound
          - Newsletters
        cold_inbound_nested: false
        newsletters_nested: false
        investor: false
        warm_intro: false
      agents:
        - inbox_triage
        - thread_watcher
        - inbox_sweep
        - draft_reply
        - decision_propagate
        - gmail_ingest
        - ingest_queue_review
        - attachment_router
        - gmail_customer_support
        - customer_crm
        - growth_inbound
        - vendor_tracker
        - gmail_crm
        - recruiting_inbound
        - inbox_task
        - team_on_it
        - duplicate_across_mailboxes

    service_account:
      description: >-
        Per-purpose service inbox. Override labels and agents per mailbox in
        mailbox_profiles below. Admin and communicative accounts keep attention
        1–3 only (no Team On It delegation label).
      labels:
        attention:
          - "1. Action"
          - "2. Reply"
          - "3. FYI"
        domain:
          - Receipts
          - Vendor
          - Ingest
        cold_inbound_nested: false
        newsletters_nested: false
        investor: false
        warm_intro: false
      agents:
        - inbox_triage
        - thread_watcher
        - inbox_sweep
        - attachment_router
        - gmail_ingest
        - vendor_tracker

  # Per-mailbox profile overrides (optional).
  # mailbox_profiles:
  #   jane@company.com: employee
  #   billing@company.com:
  #     profile: service_account
  #     labels:
  #       domain: [Receipts, Vendor]
  #     agents: [inbox_triage, thread_watcher, vendor_tracker, attachment_router]

  # OAuth scopes (union requested at consent time):
  #   gmail.readonly — read mail
  #   gmail.compose  — create drafts (draft_reply, later phases)
  #   gmail.modify   — apply labels, archive, mark read/unread
  scopes:
    - https://www.googleapis.com/auth/gmail.readonly
    - https://www.googleapis.com/auth/gmail.compose
    - https://www.googleapis.com/auth/gmail.modify
  allow_send: false

  # Primary connected mailbox (Gmail API user id; usually an email or "me").
  mailbox: me
  # Multi-mailbox dedupe (Phase 4). Primary list entry wins duplicates.
  connected_mailboxes:
    - me

  team_on_it:
    slack_channel: "#team-ops"

  receipt_router:
    day: friday
    time: "08:00"
    wiki_path: operations/gmail/receipt-routing.md
    # Inbox Ramp watches for auto-attaching receipts (Gmail API user id or email).
    destination_mailbox: me
    # Only copy receipts between mailboxes on this domain (no external forward).
    company_domain: company.com
    forward_enabled: true
    subscription_senders:
      - stripe.com
      - aws.amazon.com
      - google.com
      - mercury.com
      - ramp.com

  schedules:
    triage_interval_minutes: 30
    thread_watcher_interval_minutes: 15
    manager_times: ["08:00", "12:00", "16:00"]
    sweep_time: "22:00"
    ingest_review_day: monday
    ingest_review_time: "08:00"
    partnership_digest_day: friday
    partnership_digest_time: "08:00"
    workdays_only: true

  wiki:
    ingest_queue: operations/gmail/ingest-queue.md
    company_timeline: operations/gmail/company-timeline.md
    attachments_dir: operations/gmail/attachments
    investors_crm: operations/gmail/investors-crm.md
    investor_interests: operations/gmail/investor-interests.md
    customer_crm: operations/gmail/customer-crm.md
    media_promotion: operations/gmail/media-promotion.md
    company_connections: operations/gmail/company-connections.md
    inbound_candidates: operations/gmail/inbound-candidates.md
    vendors_dir: operations/gmail/vendors

  slack:
    ingest_channel: "#ingest"
    customer_support_channel: "#customer-support"
    events_channel: "#events"
    growth_channel: "#growth"
    partnership_digest_channel: "#partnerships"
    # Optional Slack user ID for partnership digest DM (overrides channel when set).
    partnership_digest_user: ""

  onboarding:
    backfill_days: 30

  # Label taxonomy. ``visible: true`` → messageListVisibility show (inbox list).
  labels:
    attention:
      - name: "1. Action"
        visible: true
      - name: "2. Reply"
        visible: true
      - name: "3. FYI"
        visible: true
      - name: "4. Team On It"
        visible: true
    domain:
      - name: Customer
        visible: false
      - name: Investor
        visible: false
      - name: Receipts
        visible: false
      - name: "AI Meeting Notes"
        visible: false
      - name: Meeting
        visible: false
      - name: "Meeting Request"
        visible: false
      - name: Ingest
        visible: false
      - name: Vendor
        visible: false
      - name: People
        visible: false
      - name: "Warm intro"
        visible: false
      - name: Decision
        visible: false
    cold_inbound_parent: Cold Inbound
    cold_inbound:
      - name: "Sales Outreach"
        auto_archive: true
      - name: "Investor Interest"
        auto_archive: false
      - name: "Job Seekers"
        auto_archive: true
      - name: Partnership
        auto_archive: false
      - name: "Founder Networking"
        auto_archive: false
      - name: "Press & Podcast"
        auto_archive: false
      - name: "Event Invitations"
        auto_archive: false
      - name: Miscellaneous
        auto_archive: true
    newsletters_parent: Newsletters

  # Wiki paths for confirmed investors / customers (parsed for triage + CRM agents).
  investors_wiki: operations/gmail/investors-crm.md
  customers_wiki: operations/gmail/customer-crm.md

# Slack platform (operations/slack/) — thread action items → Linear.
slack_platform:
  poll_interval_minutes: 30
  workdays_only: true
  watched_channels:
    - "#team-ops"
  action_keywords:
    - action item
    - todo
    - follow up
    - will do
    - assigned to

# Notion platform (operations/notion/) — task DB scanner + propagation.
notion_platform:
  poll_interval_minutes: 30

# External wiki mount (admin one-shot import into wiki/external/{source}/).
external_wiki:
  import:
    max_zip_bytes: 52428800       # 50 MB
    max_file_bytes: 1048576       # 1 MB per .md file
    max_files: 500
    require_admin_approval: true
    admin_channel: ""             # falls back to employee_wiki.import.admin_channel
  catalog:
    rebuild_on_mount: true
    rebuild_on_sync: false
    include_employee_wiki: true
    include_raw_entries: false

# Employee wiki (cross-cutting) — work_events materialization + zip import.
employee_wiki:
  poll_interval_minutes: 5
  import:
    max_zip_bytes: 52428800       # 50 MB
    max_file_bytes: 1048576       # 1 MB per .md file
    max_files: 500
    require_admin_first_import: true
    auto_approve_subsequent: false
    admin_channel: ""             # falls back to gmail slack ingest_channel

# Granola meeting notes (operations/granola/).
# Business: one API key per member (personal-notes scope) in GRANOLA_MEMBER_KEYS.
# Enterprise: single GRANOLA_API_KEY with public-notes scope (Team space).
granola:
  mode: business  # business | enterprise
  schedule:
    workdays_only: true
    watch_interval_minutes: 15
    post_meeting_buffer_minutes: 10
    miss_check_day: friday
    miss_check_time: "17:00"
  # Business mode roster — keys live in env (GRANOLA_MEMBER_KEYS or GRANOLA_API_KEY_<LABEL>).
  members: []
  # members:
  #   - label: alice
  #     email: alice@company.com
  #   - label: bob
  #     email: bob@company.com
  wiki:
    daily_digest: operations/granola/daily/{date}.md
  onboarding:
    backfill_days: 30

# Google Calendar (operations/gcal/). OAuth token can be shared with Gmail
# (GMAIL_OAUTH_ACCESS_TOKEN) when calendar scopes are on the same consent.
gcal:
  provider: official
  calendar_id: primary
  business_hours:
    start: "09:00"
    end: "17:00"
    timezone: UTC
  meeting:
    default_duration_minutes: 30
    slot_count: 3
    meet_conference: true
  significant_event:
    min_duration_minutes: 60
    keywords:
      - all-hands
      - board
      - investor
      - company meeting
  daily_agenda:
    enabled: false
    time: "08:00"
    slack_user: ""
