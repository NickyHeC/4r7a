default_provider: anthropic
mode: balanced
tiers:
  fast:
    anthropic: claude-haiku-4-5
    openai: gpt-4.1-mini
  standard:
    anthropic: claude-sonnet-4-6
    openai: gpt-4.1
  reasoning:
    anthropic: claude-opus-4-6
    openai: gpt-5.5
agents:
  absorb: reasoning
  draft_reply: standard
  budget_report: reasoning
  subscription_audit: standard
  card_spend: standard
agent_providers:
  absorb: anthropic
  draft_reply: anthropic
  card_spend: anthropic
  subscription_audit: anthropic
  budget_report: openai
fallback_chains:
  anthropic:
    reasoning:
    - claude-opus-4-6
    - claude-sonnet-4-6
    - claude-haiku-4-5
    standard:
    - claude-sonnet-4-6
    - claude-haiku-4-5
    fast:
    - claude-haiku-4-5
  openai:
    reasoning:
    - gpt-5.5
    - gpt-4.1
    standard:
    - gpt-4.1
    - gpt-4.1-mini
    fast:
    - gpt-4.1-mini
overrides:
  tiers:
    anthropic:
      reasoning: claude-sonnet-4-6
token_budget:
  enabled: false
  monthly_usd: 200.0
  alert_threshold_percent: 80
  hard_stop: true
  admin_channel: '#wiki-admin'
providers:
  anthropic:
    sdk: claude
  openai:
    sdk: openai
    model: gpt-5.5
  glm:
    sdk: openai
    model: glm-5
