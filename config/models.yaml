default_provider: anthropic
mode: balanced
tiers:
  fast:
    anthropic: claude-haiku-4-5
    openai: gpt-4.1-mini
  standard:
    anthropic: claude-sonnet-4-6
    openai: gpt-4.1
  reasoning:
    anthropic: claude-opus-4-6
    openai: gpt-5.5
agents:
  absorb: reasoning
  draft_reply: standard
  budget_report: reasoning
  subscription_audit: standard
  card_spend: standard
agent_providers:
  absorb: anthropic
  draft_reply: anthropic
  card_spend: anthropic
  subscription_audit: anthropic
  budget_report: openai
fallback_chains:
  anthropic:
    reasoning:
    - claude-opus-4-6
    - claude-sonnet-4-6
    - claude-haiku-4-5
    standard:
    - claude-sonnet-4-6
    - claude-haiku-4-5
    fast:
    - claude-haiku-4-5
  openai:
    reasoning:
    - gpt-5.5
    - gpt-4.1
    standard:
    - gpt-4.1
    - gpt-4.1-mini
    fast:
    - gpt-4.1-mini
overrides:
  tiers:
    anthropic:
      reasoning: claude-sonnet-4-6
token_budget:
  enabled: false
  monthly_usd: 250.0
  alert_threshold_percent: 80
  hard_stop: true
  admin_channel: '#wiki-admin'
  guidance_usd:
    runtime: 200.0
    builder: 50.0
spend_categories:
  default: runtime
  agents:
    builder: builder
run_limits:
  defaults:
    max_usd_per_run: 0.5
    max_steps_per_run: 20
    max_tool_calls_per_run: 40
  tiers: {}
  agents: {}
  builder:
    max_usd_per_run: 10.0
    max_steps_per_run: 80
    max_tool_calls_per_run: 200
model_rates: {}
eval_spotcheck:
  enabled: true
  channel: '#wiki'
  agents:
  - budget_report
  - draft_reply
  - absorb
providers:
  anthropic:
    sdk: claude
  openai:
    sdk: openai
    model: gpt-5.5
  glm:
    sdk: openai
    model: glm-5
