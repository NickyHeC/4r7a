# LLM provider configuration for company-brain agents.
#
# One knob switches the model that powers every agent. The active provider is
# selected by the COMPANY_BRAIN_LLM_PROVIDER env var, falling back to
# `default_provider` below.
#
#   anthropic — hosted Anthropic API, driven by the Claude Agent SDK.
#   openai    — hosted OpenAI API, driven by the OpenAI Agents SDK.
#   glm       — open-source GLM-5 (https://github.com/zai-org/GLM-5) served
#               behind an OpenAI-compatible endpoint (SGLang / vLLM), driven by
#               the OpenAI Agents SDK. No external tokens are billed. Self-hosted
#               on the cloud GPU VM (cloud mode), or a remote open-source host you
#               connect to (local mode option). Locally installing GLM-5 is not
#               realistic, so local installs default to a hosted provider key.
#
# Each provider declares which agent SDK drives it (`sdk: claude | openai`).
# Endpoints (base_url) and secrets (api_key) come from the environment (.env) —
# never hardcode company data or tokens here. See `.env.example`.
#
# Model ids can be overridden per deployment with COMPANY_BRAIN_LLM_MODEL.

default_provider: anthropic

providers:
  anthropic:
    sdk: claude
    # Leave blank to use the Claude Agent SDK default model, or pin one here.
    model:
  openai:
    sdk: openai
    model: gpt-5.5
  glm:
    sdk: openai
    # Install via Ollama (`ollama pull glm-5`) — easier than pulling raw weights;
    # serves an OpenAI-compatible API at :11434/v1. This model id must match the
    # Ollama model tag you pulled (override per deploy with COMPANY_BRAIN_LLM_MODEL).
    model: glm-5
